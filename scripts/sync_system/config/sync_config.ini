# Webnovel Writer Sync System Configuration
# 自动化定时任务系统配置文件

# =============================================================================
# 同步源配置
# =============================================================================
[sync_source]
repo_url = https://github.com/lingfengQAQ/webnovel-writer
branch = master
docs_paths = docs, webnovel-writer/docs, webnovel-writer/scripts
ignore_patterns = *.tmp, *.bak, __pycache__, .git

# =============================================================================
# 同步频率配置
# =============================================================================
[schedule]
frequency = weekly
weekly_day = 0
daily_time = 03:00
incremental_window_hours = 24

# =============================================================================
# 版本跟踪配置
# =============================================================================
[version_tracking]
version_file = .sync_status/version.json
strict_version_match = true
check_interval = 60
auto_rollback = true
stable_tag_pattern = v[0-9]+\.[0-9]+\.[0-9]+

# =============================================================================
# 兼容性测试配置
# =============================================================================
[testing]
trigger = on_change
timeout_seconds = 300
parallel_workers = 4
generate_coverage = true
max_test_reports = 10

[testing_scope]
check_content_accuracy = true
check_format_compatibility = true
check_link_validity = true
check_code_syntax = true
check_image_refs = true

# =============================================================================
# 依赖管理配置
# =============================================================================
[dependencies]
manifest_path = requirements.txt
optional_manifest_path = requirements-optional.txt
lock_versions = true
strict_mode = false

[dependencies_categories]
required = core
optional = optional
development = dev
cloud_services = cloud

# =============================================================================
# 通知配置
# =============================================================================
[notifications]
enabled = true
channels = console, file
webhook_url =
webhook_token =
webhook_retry_count = 3
email_smtp_server =
email_smtp_port = 587
email_use_tls = true
email_sender =
email_recipients =

[notification_thresholds]
sync_retry = 3
test_failure = true
version_mismatch = true
dependency_issue = true

# =============================================================================
# 异常处理配置
# =============================================================================
[error_handling]
max_retries = 3
retry_interval = 300
exponential_backoff = true
auto_recovery = true
save_failure_state = true

[error_recovery]
network_error_resume = true
timeout_resume = true
auth_error_resume = false

# =============================================================================
# 日志配置
# =============================================================================
[logging]
log_dir = scripts/sync_system/logs
level = INFO
format = %(asctime)s - %(name)s - %(levelname)s - %(message)s
max_file_size = 10
backup_count = 30
console_output = true
detailed_traceback = true

# =============================================================================
# 存储配置
# =============================================================================
[storage]
state_dir = .sync_status
cache_dir = .sync_cache
temp_dir = .sync_temp
history_dir = .sync_history
max_cache_size = 500
cache_expire_days = 7

# =============================================================================
# 高级配置
# =============================================================================
[advanced]
debug_mode = false
dry_run = false
skip_tests = false
skip_dependency_check = false
max_run_time_minutes = 60
